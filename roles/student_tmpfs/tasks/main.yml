---
- name: Create student user
  user:
    name: "{{ student_user }}"
    home: "/home/{{ student_user }}"
    shell: /bin/bash
    create_home: true

- name: Mount tmpfs on student home
  mount:
    path: "/home/{{ student_user }}"
    src: tmpfs
    fstype: tmpfs
    opts: "defaults,size={{ tmpfs_size }},uid={{ student_user }},gid={{ student_user }},mode=0700"
    state: mounted

- name: Deploy home-init systemd unit
  copy:
    dest: "/etc/systemd/system/{{ student_user }}-home-init.service"
    content: |
      [Unit]
      Description=Populate ephemeral {{ student_user }} home
      DefaultDependencies=no
      After=home-{{ student_user }}.mount
      Requires=home-{{ student_user }}.mount
      Before=display-manager.service

      [Service]
      Type=oneshot
      ExecStart=/bin/cp -rT /etc/skel /home/{{ student_user }}
      ExecStart=/bin/chown -R {{ student_user }}:{{ student_user }} /home/{{ student_user }}

      [Install]
      WantedBy=multi-user.target

- name: Deploy USB mass-storage block udev rule
  copy:
    src: 99-usb-block.rules
    dest: /etc/udev/rules.d/99-usb-block.rules

- name: Reload udev rules
  command: udevadm control --reload-rules

- name: Enable home-init service
  systemd:
    name: "{{ student_user }}-home-init.service"
    enabled: true
    daemon_reload: true
